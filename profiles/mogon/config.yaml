# ---------------------------------------------------------------------------
# Executor
# ---------------------------------------------------------------------------
executor: slurm

# ---------------------------------------------------------------------------
# Job control
# ---------------------------------------------------------------------------
# Maximum number of simultaneously running jobs.
# Note: this example sets the 'jobs' to "unlimited". However, when executing
# truely huge workflows, we recomment setting this to a reasonable value 
# (e.g. 1000) to avoid overwhelming the scheduler.
jobs: unlimited

# Maximum number of jobs to submit at once (Slurm queues them, but submitting
# thousands at once is wasteful and slows down the scheduler).
max-jobs-per-second: 5
max-status-checks-per-second: 0.5

# ---------------------------------------------------------------------------
# Fault tolerance
# ---------------------------------------------------------------------------
# Retry each failed job one time.
retries: 2

# Wait up to 5 s for output files to appear on the shared filesystem after
# a job finishes (takes possible metadata latency into account).
latency-wait: 5

# Keep going with independent jobs even if some jobs fail.
keep-going: True

# ---------------------------------------------------------------------------
# Default Slurm resource settings
# These are overridden by per-rule `resources:` blocks in the workflow.
# ---------------------------------------------------------------------------
default-resources:
  # Partition: use the default (compute) partition unless overridden.
  # Note: set to "ki-smallcpu" when using the cluster "mogonki" and to 
  # "smallcpu" when using the cluster "mogonnhr".
  slurm_partition: "smallcpu"

  # runtime
  # Usually not needed if there the cluster's Slurm defines a default runtime for jobs.
  # This value is first parsed Snakemake itself, then converted to a Slurm-friendly
  # string by the snakemake-executor-plugin.
  # This means you have to use a string that is parsable by Snakemake (e.g. the usual 2:00:00 = 2h)
  # does not work
  runtime: "2h"

  # CPUs per task (cpus-per-task is equivalent to threads in Snakemake).
  threads: 1

  # Memory in MB per node.
  # rules needing more must declare resources: mem_mb=<value>
  mem_mb: 1800

# ---------------------------------------------------------------------------
# Storage related settings
# These may be overwritten with specific file access patterns.
# ---------------------------------------------------------------------------
default-storage-provider: fs # this requires the snakemake-storgage-plugin-fs to be installed
local-storage-prefix: /dev/shm/$USER
remote-job-local-storage-prefix: /localscratch/$SLURM_JOB_ID 

# ---------------------------------------------------------------------------
# Slurm-specific submission options (passed via --slurm-* flags or embedded
# in the job script).
# ---------------------------------------------------------------------------
slurm-logdir: "/home/$USER/.snakemake/slurm_logs"
slurm-keep-successful-logs: False
slurm-efficiency-report: True

# ---------------------------------------------------------------------------
# Rerun behaviour
# ---------------------------------------------------------------------------
rerun-incomplete: True

# ---------------------------------------------------------------------------
# Reporting / verbosity
# ---------------------------------------------------------------------------
printshellcmds: False
show-failed-logs: True
